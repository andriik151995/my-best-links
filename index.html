<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мої улюблені посилання</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<style>
body { background-color: #f4f4f9; max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
.category-title { text-transform: uppercase; letter-spacing: 1px; margin-top: 30px; font-weight: bold; }
.link-item { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<h2 class="w3-center" style="margin-top:40px;">⭐ Моя збірка посилань</h2>

<!-- ФОРМА ДЛЯ ДОДАВАННЯ -->
<div class="w3-card-4 w3-white w3-padding w3-round" style="margin-bottom: 40px;">
<h4 class="w3-text-teal" style="margin-top:0;">Додати нове посилання:</h4>
<form id="linkForm" class="w3-container">
<p>
<label>Категорія</label>
<input class="w3-input w3-border w3-round" type="text" id="categoryInput" placeholder="Наприклад: Навчання" required>
</p>
<p>
<label>Назва сайту</label>
<input class="w3-input w3-border w3-round" type="text" id="titleInput" placeholder="Наприклад: GitHub" required>
</p>
<p>
<label>Посилання (URL)</label>
<input class="w3-input w3-border w3-round" type="url" id="urlInput" placeholder="https://..." required>
</p>
<button type="submit" class="w3-button w3-teal w3-round w3-right" style="margin-bottom:10px;">Зберегти</button>
</form>
</div>

<hr>

<!-- ТУТ ВИВОДЯТЬСЯ ПОСИЛАННЯ -->
<div id="content" class="w3-container">Завантаження посилань...</div>

<script>
// ⚠️ ВСТАВТЕ СЮДИ ВАШЕ ПОСИЛАННЯ З SHEETDB
const apiSecretUrl = "https://sheetdb.io/api/v1/x12v2eesnvraf";

// 1. ЧИТАННЯ ДАНИХ
async function loadLinks() {
try {
const response = await fetch(apiSecretUrl);
const data = await response.json();

const categories = {};

if (!Array.isArray(data)) {
document.getElementById("content").innerHTML = "<p class='w3-center w3-text-red'>Помилка конфігурації бази даних.</p>";
return;
}

data.forEach(row => {
// Цей рядок автоматично знаходить колонку, навіть якщо вона написана як Category, category, CATEGORY тощо.
const category = row.Category || row.category || row.CATEGORY || Object.values(row)[0];
const title = row.Title || row.title || row.TITLE || Object.values(row)[1];
const url = row.URL || row.url || row.url || Object.values(row)[2];

if (!category || !title || !url) return;

const cleanCategory = category.toString().trim();
if (!categories[cleanCategory]) {
categories[cleanCategory] = [];
}
categories[cleanCategory].push({ title: title.toString().trim(), url: url.toString().trim() });
});

const contentDiv = document.getElementById("content");
contentDiv.innerHTML = ""; 

if (Object.keys(categories).length === 0) {
contentDiv.innerHTML = "<p class='w3-center w3-text-grey'>Немає збережених посилань. Додайте перше!</p>";
return;
}

for (const category in categories) {
let html = `<h3 class="category-title w3-text-teal">${category}</h3><div class="w3-ul w3-card w3-white w3-round">`;
categories[category].forEach(link => {
html += `
<li class="w3-padding-large link-item">
<a href="${link.url}" target="_blank" class="w3-text-indigo w3-hover-text-blue" style="text-decoration:none; font-weight:600;">
🔗 ${link.title}
</a>
<span class="w3-small w3-text-grey w3-hide-small">${link.url}</span>
</li>`;
});
html += `</div>`;
contentDiv.innerHTML += html;
}
} catch (error) {
document.getElementById("content").innerHTML = "<p class='w3-text-red w3-center'>Помилка завантаження даних.</p>";
console.error(error);
}
}

// 2. ВІДПРАВЛЕННЯ ДАНИХ ДЛЯ БУДЬ-ЯКОГО РЕГІСТРУ КОЛОНОК
document.getElementById('linkForm').addEventListener('submit', async function(e) {
e.preventDefault();

const category = document.getElementById('categoryInput').value;
const title = document.getElementById('titleInput').value;
const url = document.getElementById('urlInput').value;

// Відправляємо дані одразу у двох форматах (з великої та малої літери), щоб SheetDB точно прийняв їх
const newRow = {
data: [
{
Category: category,
category: category,
Title: title,
title: title,
URL: url,
url: url
}
]
};

try {
const response = await fetch(apiSecretUrl, {
method: 'POST',
headers: {
'Accept': 'application/json',
'Content-Type': 'application/json'
},
body: JSON.stringify(newRow)
});

if(response.ok) {
document.getElementById('linkForm').reset();
loadLinks();
} else {
alert("Помилка SheetDB: сервер відхилив запит.");
}
} catch (error) {
console.error("Помилка:", error);
}
});

loadLinks();
</script>
</body>
</html>
