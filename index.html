<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель Закладок Pro</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
/* БАЗОВІ СТИЛІ ТА СВІТЛА ТЕМА (ЗА ЗАМОВЧУВАННЯМ) */
:root {
--bg-body: #f8f9fa;
--bg-sidebar: #222e3c;
--bg-sidebar-hover: #2e3e52;
--text-sidebar-link: #a2aab2;
--bg-card: #fff;
--bg-header: #fff;
--text-main: #333;
--text-muted: #666;
--border-card: #3b7ddd;
}

/* СТИЛІ ДЛЯ ТЕМНОЇ ТЕМИ */
body.dark-theme {
--bg-body: #1e2631;
--bg-sidebar: #151c24;
--bg-sidebar-hover: #222e3c;
--text-sidebar-link: #8e99a5;
--bg-card: #222e3c;
--bg-header: #222e3c;
--text-main: #f8f9fa;
--text-muted: #a2aab2;
--border-card: #3b7ddd;
}

body { background-color: var(--bg-body); font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; transition: background-color 0.3s; color: var(--text-main); }

.sidebar { height: 100vh; width: 250px; background-color: var(--bg-sidebar); position: fixed; top: 0; left: 0; z-index: 1; overflow-x: hidden; padding-top: 20px; transition: background-color 0.3s; }
.sidebar a { padding: 12px 24px; text-decoration: none; display: block; color: var(--text-sidebar-link); transition: 0.3s; font-size: 15px; }
.sidebar a:hover, .sidebar a.active { background-color: var(--bg-sidebar-hover); color: #fff; }

.main-content { margin-left: 250px; padding: 30px; min-height: 100vh; background-color: var(--bg-body); display: block; transition: background-color 0.3s; }

.link-card { position: relative; transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s; border-left: 4px solid var(--border-card); background: var(--bg-card); margin-bottom: 20px; }
.link-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.15)!important; }

.delete-btn { position: absolute; top: 10px; right: 10px; color: #d9534f; cursor: pointer; opacity: 0.3; transition: opacity 0.2s; }
.link-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: #c9302c; }

#authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #222e3c; z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; text-align: center; }

.header-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; background-color: var(--bg-header)!important; color: var(--text-main); transition: background-color 0.3s; }
.search-container { flex-grow: 1; max-width: 350px; margin: 0 15px; }
.search-container input { background-color: var(--bg-body); color: var(--text-main); border: 1px solid var(--text-muted); }

.site-favicon { width: 24px; height: 24px; border-radius: 4px; margin-right: 10px; vertical-align: middle; object-fit: contain; }
.card-header-flex { display: flex; align-items: center; margin-top: 5px; margin-bottom: 5px; max-width: 85%; }
.card-buttons-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 8px; }

/* Кастомні кольори для тексту в залежності від теми */
.theme-text { color: var(--text-main); }
.theme-muted-text { color: var(--text-muted); }

@media screen and (max-width: 768px) { 
.sidebar { width: 100%; height: auto; position: relative; } 
.main-content { margin-left: 0; padding: 15px; }
.search-container { max-width: 100%; margin: 10px 0; order: 3; width: 100%; }
}
</style>
</head>
<body>

<div id="authOverlay">
<div class="w3-card-4 w3-dark-grey w3-padding w3-round-large" style="width: 90%; max-width: 400px; margin: auto; margin-top: 15vh;">
<h3 class="w3-center"><i class="fa fa-lock w3-margin-right"></i>Вхід у кабінет</h3>
<p class="w3-small w3-text-grey">Введіть пароль для доступу до ваших закладок</p>
<div class="w3-padding-16">
<input class="w3-input w3-border w3-round w3-text-black" type="password" id="passwordInput" placeholder="Пароль" style="text-align: center;">
<button onclick="checkPassword()" class="w3-button w3-blue w3-block w3-round w3-margin-top" style="font-weight: 600;">Увійти</button>
</div>
<p id="authError" class="w3-text-red w3-small" style="display:none;">Невірний пароль!</p>
</div>
</div>

<div class="sidebar w3-card" id="mySidebar">
<div class="w3-padding w3-text-white w3-large w3-border-bottom w3-border-dark-grey" style="font-weight: bold; margin-bottom: 20px;">
<i class="fa fa-sliders w3-margin-right"></i>BookmarkApp
</div>
<div id="categoryMenu">
<p class="w3-padding w3-small w3-text-grey">Завантаження...</p>
</div>
</div>

<div class="main-content">
<div class="w3-container w3-card-2 w3-round w3-padding w3-margin-bottom header-container">
<h2 class="w3-margin-0" style="font-weight: 600; color: #3b7ddd; font-size: 24px;">
<i class="fa fa-bookmark-o w3-margin-right"></i>Моя панель
</h2>

<div class="search-container">
<div class="w3-display-container">
<input class="w3-input w3-round-large" type="text" id="searchInput" onkeyup="liveSearch()" placeholder="Пошук за назвою...">
<span class="w3-display-right w3-margin-right w3-text-grey"><i class="fa fa-search"></i></span>
</div>
</div>

<div style="display: flex; align-items: center; gap: 10px;">
<button onclick="toggleTheme()" class="w3-button w3-light-grey w3-round-large" id="themeBtn" title="Змінити тему">
<i class="fa fa-moon-o"></i>
</button>
<button onclick="document.getElementById('addModal').style.display='block'" class="w3-button w3-blue w3-round-large">
<i class="fa fa-plus w3-margin-right"></i>Додати
</button>
</div>
</div>

<div id="linksGrid" class="w3-row-padding" style="margin: 20px -16px 0 -16px;">
<p class="w3-center w3-text-grey">Очікування авторизації...</p>
</div>
</div>

<div id="addModal" class="w3-modal" style="color: #333;">
<div class="w3-modal-content w3-card-4 w3-animate-zoom w3-round-large" style="max-width:550px;">
<header class="w3-container w3-blue w3-padding-16 w3-round-large" style="border-bottom-left-radius:0; border-bottom-right-radius:0;"> 
<span onclick="document.getElementById('addModal').style.display='none'" class="w3-button w3-display-topright w3-round-large">&times;</span>
<h3 class="w3-margin-0"><i class="fa fa-plus-circle w3-margin-right"></i>Нова закладка</h3>
</header>

<form id="linkForm" class="w3-container w3-padding-24 w3-white w3-round-large" style="border-top-left-radius:0; border-top-right-radius:0;">
<p>
<label><i class="fa fa-folder-open w3-margin-right"></i>Категорія</label>
<input class="w3-input w3-border w3-round" type="text" id="categoryInput" placeholder="Наприклад: Розробка" required>
</p>
<p>
<label><i class="fa fa-font w3-margin-right"></i>Назва сайту</label>
<input class="w3-input w3-border w3-round" type="text" id="titleInput" placeholder="Наприклад: GitHub" required>
</p>
<p>
<label><i class="fa fa-link w3-margin-right"></i>Посилання (URL)</label>
<input class="w3-input w3-border w3-round" type="url" id="urlInput" placeholder="https://..." required>
</p>
<p>
<label><i class="fa fa-pencil w3-margin-right"></i>Короткий опис</label>
<input class="w3-input w3-border w3-round" type="text" id="descInput" placeholder="Що це за сайт?">
</p>
<p>
<label><i class="fa fa-star w3-margin-right"></i>Ваша оцінка</label>
<select class="w3-select w3-border w3-round" id="ratingInput">
<option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
<option value="4">⭐⭐⭐⭐ (4/5)</option>
<option value="3">⭐⭐⭐ (3/5)</option>
<option value="2">⭐⭐ (2/5)</option>
<option value="1">⭐ (1/5)</option>
</select>
</p>
<div class="w3-padding-16" style="display: flow-root;">
<button type="submit" class="w3-button w3-blue w3-round w3-right w3-margin-left">Зберегти</button>
<button type="button" onclick="document.getElementById('addModal').style.display='none'" class="w3-button w3-light-grey w3-round w3-right">Скасувати</button>
</div>
</form>
</div>
</div>

<script>
const apiSecretUrl = "https://sheetdb.io/api/v1/iraf0k6sanrie";
const CORRECT_PASSWORD = "admin"; 

let allLinks = [];
let currentFilter = 'all';

// НАЛАШТУВАННЯ ТЕМНОЇ ТЕМИ ЧЕРЕЗ LOCALSTORAGE
if (localStorage.getItem('theme') === 'dark') {
document.body.classList.add('dark-theme');
document.getElementById('themeBtn').innerHTML = `<i class="fa fa-sun-o"></i>`;
}

function toggleTheme() {
document.body.classList.toggle('dark-theme');
const btn = document.getElementById('themeBtn');

if (document.body.classList.contains('dark-theme')) {
localStorage.setItem('theme', 'dark');
btn.innerHTML = `<i class="fa fa-sun-o"></i>`;
} else {
localStorage.setItem('theme', 'light');
btn.innerHTML = `<i class="fa fa-moon-o"></i>`;
}
}

function checkPassword() {
const enteredPassword = document.getElementById("passwordInput").value;
if (enteredPassword === CORRECT_PASSWORD) {
document.getElementById("authOverlay").style.display = "none";
loadLinks();
} else {
document.getElementById("authError").style.display = "block";
}
}

document.getElementById("passwordInput").addEventListener("keyup", function(event) {
if (event.key === "Enter") checkPassword();
});

async function loadLinks() {
try {
document.getElementById("linksGrid").innerHTML = "<p class='w3-center w3-text-grey'>Синхронізація з базою...</p>";
const response = await fetch(apiSecretUrl);
allLinks = await response.json();

if (!Array.isArray(allLinks)) return;

renderMenu();
renderLinks(currentFilter); 
document.getElementById("searchInput").value = "";
} catch (error) {
document.getElementById("linksGrid").innerHTML = "<p class='w3-text-red w3-center'>Помилка підключення.</p>";
}
}

function renderMenu() {
const menuDiv = document.getElementById("categoryMenu");
const categories = new Set();

allLinks.forEach(row => {
const cat = row.Category || row.category || Object.values(row)[0];
if (cat) categories.add(cat.toString().trim());
});

let menuHtml = `<a href="#" onclick="filterCategory('all', this)" class="w3-bar-item ${currentFilter === 'all' ? 'active' : ''}"><i class="fa fa-th w3-margin-right"></i>Всі закладки</a>`;
categories.forEach(cat => {
menuHtml += `<a href="#" onclick="filterCategory('${cat}', this)" class="w3-bar-item ${currentFilter === cat ? 'active' : ''}"><i class="fa fa-folder-o w3-margin-right"></i>${cat}</a>`;
});
menuDiv.innerHTML = menuHtml;
}

function filterCategory(cat, element) {
currentFilter = cat;
const links = document.getElementById("categoryMenu").getElementsByTagName("a");
for(let i=0; i<links.length; i++) links[i].classList.remove("active");
element.classList.add("active");

document.getElementById("searchInput").value = "";
renderLinks(cat);
}

function renderLinks(filter) {
const grid = document.getElementById("linksGrid");
grid.innerHTML = "";
let count = 0;

allLinks.forEach((row, index) => {
const category = (row.Category || row.category || Object.values(row)[0] || "").toString().trim();
const title = (row.Title || row.title || Object.values(row)[1] || "").toString().trim();
const url = (row.URL || row.url || Object.values(row)[2] || "").toString().trim();
const desc = (row.Description || row.description || row.desc || Object.values(row)[3] || "Опис не додано.").toString().trim();
const rating = parseInt(row.Rating || row.rating || Object.values(row)[4] || "5");

if (filter !== 'all' && category !== filter) return;
if (!title || !url) return;

count++;
let stars = "⭐".repeat(rating);

let domain = "";
try { domain = new URL(url).hostname; } catch(e) { domain = ""; }
const faviconUrl = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : "";

grid.innerHTML += `
<div class="w3-col l4 m6 w3-margin-bottom card-item" data-title="${title.toLowerCase()}" data-desc="${desc.toLowerCase()}" data-cat="${category.toLowerCase()}">
<div class="w3-card w3-padding w3-round-large link-card">
<span class="delete-btn" onclick="deleteLink('${title}')" title="Видалити закладку">
<i class="fa fa-trash"></i>
</span>
<span class="w3-tag w3-small w3-light-grey w3-text-grey w3-round w3-right" style="padding: 3px 8px; margin-right: 20px;">${category}</span>

<div class="card-header-flex">
${faviconUrl ? `<img src="${faviconUrl}" class="site-favicon" alt="ico" onerror="this.style.display='none'">` : ''}
<h4 class="theme-text" style="font-weight:600; margin:0; font-size:18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</h4>
</div>

<div class="w3-small w3-text-amber w3-margin-bottom">${stars}</div>
<p class="w3-small theme-muted-text" style="height:40px; overflow:hidden; margin-bottom:15px;">${desc}</p>

<div class="card-buttons-grid">
<a href="${url}" target="_blank" class="w3-button w3-blue w3-block w3-round w3-small" style="font-weight:600; text-decoration:none;">
<i class="fa fa-external-link w3-margin-right"></i>Відкрити
</a>
<button id="copyBtn-${index}" onclick="copyToClipboard('${url}', ${index})" class="w3-button w3-light-grey w3-block w3-round w3-small w3-text-dark-grey" style="font-weight:600; padding: 5px 0;" title="Скопіювати посилання">
<i class="fa fa-clone"></i>
</button>
</div>
</div>
</div>`;
});

if(count === 0) {
grid.innerHTML = "<div class='w3-container w3-center w3-text-grey w3-padding-64'><h4>У цій категорії немає закладок</h4></div>";
}
}

function copyToClipboard(url, index) {
navigator.clipboard.writeText(url).then(() => {
const btn = document.getElementById(`copyBtn-${index}`);
const originalHtml = btn.innerHTML;

btn.classList.remove('w3-light-grey', 'w3-text-dark-grey');
btn.classList.add('w3-green');
btn.innerHTML = `<i class="fa fa-check"></i> <span style="font-size:10px;">Ок!</span>`;

setTimeout(() => {
btn.classList.remove('w3-green');
btn.classList.add('w3-light-grey', 'w3-text-dark-grey');
btn.innerHTML = originalHtml;
}, 1500);
}).catch(err => {
console.error('Не вдалося скопіювати: ', err);
});
}

function liveSearch() {
const searchQuery = document.getElementById("searchInput").value.toLowerCase().trim();
const cards = document.getElementsByClassName("card-item");

for (let i = 0; i < cards.length; i++) {
const title = cards[i].getAttribute("data-title");
const desc = cards[i].getAttribute("data-desc");
const cat = cards[i].getAttribute("data-cat");

if (title.includes(searchQuery) || desc.includes(searchQuery) || cat.includes(searchQuery)) {
cards[i].style.display = "";
} else {
cards[i].style.display = "none";
}
}
}

async function deleteLink(title) {
if (!confirm(`Ви впевнені, що хочете видалити закладку "${title}"?`)) return;
const deleteUrl = `${apiSecretUrl}/Title/${encodeURIComponent(title)}`;
try {
const response = await fetch(deleteUrl, {
method: 'DELETE',
headers: { 'Content-Type': 'application/json' }
});
if (response.ok) {
loadLinks();
} else {
alert("Помилка видалення.");
}
} catch (error) {
console.error("Помилка:", error);
}
}

document.getElementById('linkForm').addEventListener('submit', async function(e) {
e.preventDefault();
const category = document.getElementById('categoryInput').value;
const title = document.getElementById('titleInput').value;
const url = document.getElementById('urlInput').value;
const desc = document.getElementById('descInput').value;
const rating = document.getElementById('ratingInput').value;

const newRow = {
data: [{
Category: category, category: category,
Title: title, title: title,
URL: url, url: url,
Description: desc, description: desc,
Rating: rating, rating: rating
}]
};

try {
const response = await fetch(apiSecretUrl, {
method: 'POST',
headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
body: JSON.stringify(newRow)
});

if(response.ok) {
document.getElementById('linkForm').reset();
document.getElementById('addModal').style.display='none'; 
loadLinks(); 
} else {
alert("Помилка додавання.");
}
} catch (error) {
console.error(error);
}
});
</script>
</body>
</html>
