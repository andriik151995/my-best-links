<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Преміум Панель Закладок</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
:root {
--primary-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
--card-bg: rgba(255, 255, 255, 0.95);
--text-main: #2d3748;
--accent-blue: #3b82f6;
--sidebar-bg: #1e2640;
}

/* Стильний градієнтний фон для всього сайту */
body { 
background: var(--primary-gradient); 
background-attachment: fixed;
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
color: var(--text-main);
min-height: 100vh;
margin: 0;
}

/* Оновлена бічна панель з ефектом глибини */
.sidebar { 
height: 100%; 
width: 260px; 
background-color: var(--sidebar-bg); 
position: fixed!important; 
z-index: 1; 
overflow: auto; 
box-shadow: 4px 0 15px rgba(0,0,0,0.3);
}
.sidebar a { 
padding: 14px 24px; 
text-decoration: none; 
display: block; 
color: #94a3b8; 
transition: all 0.25s ease;
font-weight: 500;
border-left: 4px solid transparent;
}
.sidebar a:hover, .sidebar a.active { 
background-color: rgba(255,255,255,0.08); 
color: #fff; 
border-left: 4px solid var(--accent-blue);
}

/* Головна робоча область */
.main-content { 
margin-left: 260px; 
padding: 40px; 
}

/* Скляний ефект для верхньої плашки (Glassmorphism) */
.glass-header {
background: rgba(255, 255, 255, 0.15);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
color: #fff;
border-radius: 16px;
}

/* Преміум дизайн карток для посилань */
.link-card { 
background: var(--card-bg);
border-radius: 16px;
box-shadow: 0 10px 25px rgba(0,0,0,0.15);
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
border: 1px solid rgba(255,255,255,0.2);
display: flex;
flex-direction: column;
justify-content: space-between;
height: 220px;
}
.link-card:hover { 
transform: translateY(-6px); 
box-shadow: 0 20px 35px rgba(0,0,0,0.3); 
}
